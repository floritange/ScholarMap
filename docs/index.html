<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScholarMap - Academic Relationship Graph</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><line x1='20' y1='18' x2='44' y2='30' stroke='%23D97757' stroke-width='3'/><line x1='20' y1='18' x2='28' y2='46' stroke='%23D97757' stroke-width='3'/><line x1='44' y1='30' x2='28' y2='46' stroke='%23D97757' stroke-width='3'/><circle cx='20' cy='18' r='7' fill='%234A7EC4'/><circle cx='44' cy='30' r='9' fill='%234A9E6E'/><circle cx='28' cy='46' r='6' fill='%23C89418'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root {
  --bg:#E8E6DC;--bg-card:#F5F4ED;--bg-dark:#1A1A19;
  --text:#141413;--text-secondary:#5C5C58;--text-muted:#9A998E;
  --accent:#D97757;--accent-hover:#C5664A;
  --green:#4A9E6E;--yellow:#C89418;--red:#C44D3E;--blue:#4A7EC4;--purple:#8B6CC4;
  --border:rgba(20,20,19,0.12);--border-strong:rgba(20,20,19,0.22);
  --radius:6px;
  --serif:'Instrument Serif',Georgia,serif;
  --sans:'Inter',-apple-system,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:16px;-webkit-font-smoothing:antialiased}
::selection{background:rgba(217,119,87,0.3)}
h1{font-family:var(--serif);font-weight:400;font-size:1.5rem}
h2{font-family:var(--serif);font-weight:400;font-size:1.4rem;margin-bottom:0.75rem}
h3{font-family:var(--sans);font-weight:600;font-size:1rem}
h4{font-family:var(--sans);font-weight:600;font-size:0.875rem;margin-bottom:0.4rem}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem}
.tag{display:inline-block;padding:0.15rem 0.5rem;border-radius:3px;font-size:0.75rem;font-weight:600;margin-right:0.3rem}
.tag-accent{background:rgba(217,119,87,0.15);color:var(--accent)}
.tag-blue{background:rgba(74,126,196,0.15);color:var(--blue)}
.tag-green{background:rgba(74,158,110,0.15);color:var(--green)}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{display:flex;align-items:center;gap:1rem;padding:0.75rem 1.25rem;border-bottom:1px solid var(--border);flex-shrink:0}
header .logo{font-family:var(--serif);font-size:1.25rem;white-space:nowrap}
header .logo span{color:var(--accent)}
#search{flex:1;max-width:280px;padding:0.4rem 0.75rem;border:1px solid var(--border-strong);border-radius:100px;font-family:var(--sans);font-size:0.875rem;background:var(--bg-card);outline:none}
#search:focus{border-color:var(--accent)}
/* venue trigger button in header */
.venue-wrap{position:relative;flex-shrink:0}
.venue-trigger{padding:0.35rem 0.75rem;border:1px solid var(--border-strong);border-radius:100px;font-size:0.8rem;font-weight:500;background:var(--bg-card);color:var(--text);cursor:pointer;transition:all 0.15s;white-space:nowrap;font-family:var(--sans)}
.venue-trigger:hover{border-color:var(--text)}
.venue-trigger .venue-count{font-size:0.7rem;color:var(--accent);font-weight:600}
/* floating dropdown panel */
.venue-dropdown{position:absolute;top:calc(100% + 0.4rem);right:0;width:480px;max-height:70vh;overflow-y:auto;background:var(--bg-card);border:1px solid var(--border-strong);border-radius:10px;box-shadow:0 12px 40px rgba(0,0,0,0.15);padding:0.85rem;z-index:200}
.venue-dropdown.hidden{display:none}
/* area group inside dropdown */
.area-group{margin-bottom:0.6rem}
.area-group:last-child{margin-bottom:0}
.area-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.4rem}
.area-label{font-size:0.7rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em}
.area-actions{font-size:0.65rem;color:var(--accent);cursor:pointer;background:none;border:none;font-family:var(--sans)}
.area-actions:hover{text-decoration:underline}
.area-chips{display:flex;gap:0.3rem;flex-wrap:wrap}
/* venue chips */
.chip{padding:0.3rem 0.65rem;border:1.5px solid var(--border-strong);border-radius:100px;font-size:0.75rem;font-weight:500;background:transparent;color:var(--text-secondary);cursor:pointer;transition:all 0.15s}
.chip:hover{border-color:var(--text);color:var(--text)}
.chip.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.chip .cnt{opacity:0.5;font-size:0.65rem;margin-left:0.1rem}
/* All / None row at top of dropdown */
.dropdown-top{display:flex;gap:0.4rem;margin-bottom:0.6rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border)}
.dropdown-top .btn{padding:0.25rem 0.65rem;border:1.5px solid var(--border-strong);border-radius:100px;font-size:0.72rem;font-weight:600;background:transparent;color:var(--text-secondary);cursor:pointer;transition:all 0.15s;font-family:var(--sans)}
.dropdown-top .btn:hover{border-color:var(--text);color:var(--text)}
.dropdown-top .btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.main{display:flex;flex:1;overflow:hidden}
#graph-container{flex:1;position:relative;overflow:hidden}
#graph-container svg{width:100%;height:100%;display:block}
.graph-hint{position:absolute;bottom:1rem;left:50%;transform:translateX(-50%);font-size:0.75rem;color:var(--text-muted);background:rgba(245,244,237,0.9);padding:0.3rem 0.8rem;border-radius:100px;pointer-events:none;opacity:1;transition:opacity 1s}
.graph-hint.hidden{opacity:0}
.breadcrumb{position:absolute;top:0.6rem;left:0.8rem;display:flex;align-items:center;gap:0.3rem;font-size:0.75rem;color:var(--text-muted);pointer-events:auto;z-index:10}
.breadcrumb span{cursor:pointer;padding:0.15rem 0.4rem;border-radius:var(--radius);transition:all 0.15s}
.breadcrumb span:hover{background:rgba(20,20,19,0.06);color:var(--text)}
.breadcrumb .sep{cursor:default;padding:0;color:var(--text-muted);opacity:0.5}
.breadcrumb .sep:hover{background:none;color:var(--text-muted)}
.breadcrumb .current{color:var(--text);font-weight:500;cursor:default}
.breadcrumb .current:hover{background:none}
#panel{width:340px;flex-shrink:0;border-left:1px solid var(--border);padding:1.25rem;overflow-y:auto;background:var(--bg)}
#panel .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.5rem;margin-bottom:1rem}
#panel .stat{text-align:center;padding:0.5rem;background:var(--bg-card);border-radius:var(--radius);border:1px solid var(--border)}
#panel .stat .num{font-family:var(--serif);font-size:1.75rem;color:var(--accent);line-height:1.1}
#panel .stat .label{font-size:0.7rem;color:var(--text-muted);margin-top:0.15rem}
.filter-scope{font-size:0.75rem;color:var(--text-muted);margin-bottom:0.75rem;padding:0.3rem 0.5rem;background:var(--bg-card);border-radius:var(--radius);border:1px solid var(--border)}
.list-item{padding:0.4rem 0.5rem;border-radius:var(--radius);cursor:pointer;font-size:0.85rem;transition:background 0.1s;display:flex;justify-content:space-between;align-items:center}
.list-item:hover{background:rgba(217,119,87,0.08)}
.list-item .count{font-family:var(--mono);font-size:0.75rem;color:var(--text-muted)}
.clickable-stat{cursor:pointer;border-radius:var(--radius);transition:background 0.15s}
.clickable-stat:hover{background:rgba(217,119,87,0.08)}
.clickable-stat .label{color:var(--accent)}
.rank-list .list-item{padding:0.35rem 0.5rem;justify-content:flex-start;gap:0.4rem}
.rank-list .rank-num{color:var(--text-muted);font-family:var(--mono);font-size:0.75rem;min-width:2rem;flex-shrink:0}
.rank-list .list-item .count{margin-left:auto}
.paper-item{padding:0.5rem 0;border-bottom:1px solid var(--border);font-size:0.8rem}
.paper-title{cursor:pointer;color:var(--text);font-weight:500;line-height:1.4;display:flex;align-items:baseline;gap:0.4rem}
.paper-title:hover{color:var(--accent)}
.paper-title .arrow{font-size:0.65rem;color:var(--text-muted);transition:transform 0.2s;flex-shrink:0}
.paper-title .arrow.open{transform:rotate(90deg)}
.paper-title .pos-tag{font-size:0.65rem;padding:0.1rem 0.35rem;border-radius:3px;background:rgba(74,126,196,0.12);color:var(--blue);font-weight:600;flex-shrink:0;white-space:nowrap}
.paper-title .pos-tag.last{background:rgba(217,119,87,0.12);color:var(--accent)}
.venue-tag{font-size:0.6rem;padding:0.1rem 0.3rem;border-radius:3px;background:rgba(74,158,110,0.12);color:var(--green);font-weight:600;flex-shrink:0;white-space:nowrap;margin-right:0.1rem}
.paper-authors{font-size:0.75rem;color:var(--text-muted);line-height:1.5;margin-top:0.2rem}
.paper-author{color:var(--accent);cursor:pointer}
.paper-author:hover{text-decoration:underline}
.paper-author-plain{color:var(--text-muted)}
.paper-abstract{max-height:0;overflow:hidden;transition:max-height 0.3s ease;font-size:0.78rem;color:var(--text-secondary);line-height:1.5}
.paper-abstract.open{max-height:500px}
.section-label{font-size:0.75rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin:1rem 0 0.4rem}
footer{display:flex;justify-content:space-between;align-items:center;padding:0.5rem 1.25rem;border-top:1px solid var(--border);font-size:0.75rem;color:var(--text-muted);flex-shrink:0}
footer button{font-family:var(--sans);font-size:0.75rem;padding:0.3rem 0.75rem;border:1px solid var(--border-strong);border-radius:var(--radius);background:transparent;color:var(--text-secondary);cursor:pointer}
footer button:hover{background:rgba(20,20,19,0.04)}
.tooltip{position:fixed;padding:0.4rem 0.7rem;background:var(--bg-dark);color:#F5F4ED;border-radius:var(--radius);font-size:0.75rem;pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:100;white-space:nowrap}
.node-group{cursor:pointer}
.node-circle{transition:opacity 0.3s,filter 0.3s}
.node-label{font-family:var(--sans);pointer-events:none;fill:var(--text);font-size:10px;text-anchor:middle}
.edge-line{stroke:rgba(20,20,19,0.15);fill:none}
.edge-line.highlighted{stroke:var(--accent);opacity:1!important}
.node-circle.dimmed,.edge-line.dimmed{opacity:0.08}
.node-circle.glowing{filter:drop-shadow(0 0 6px var(--accent))}
.tag-secondary{background:rgba(20,20,19,0.06)!important;color:var(--text-secondary)!important}
.panel-nav{display:flex;align-items:center;gap:0.6rem;margin-bottom:0.5rem}
.back-btn{font-size:0.8rem;color:var(--accent);cursor:pointer;display:inline-block}
.back-btn:hover{text-decoration:underline}
.home-btn{font-size:0.8rem;color:var(--text-muted);cursor:pointer;margin-left:auto}
.home-btn:hover{color:var(--accent)}
.empty-state{text-align:center;padding:2rem 1rem;color:var(--text-muted);font-size:0.85rem}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">Scholar<span>Map</span></div>
    <input id="search" type="text" placeholder="Search authors, papers...">
    <div class="venue-wrap">
      <button id="venue-trigger" class="venue-trigger">Conferences <span id="venue-count" class="venue-count"></span> ▾</button>
      <div id="venue-dropdown" class="venue-dropdown hidden"></div>
    </div>
  </header>
  <div class="main">
    <div id="graph-container">
      <div class="breadcrumb" id="breadcrumb"></div>
      <div class="graph-hint" id="graph-hint">Click org to expand · Click person to view · Click blank to go back · Scroll to zoom</div>
    </div>
    <div id="panel"><div class="empty-state">Loading graph data...</div></div>
  </div>
  <footer>
    <span id="footer-info">Loading...</span>
  </footer>
</div>
<div class="tooltip" id="tooltip"></div>
<script>
// === Global state ===
let DATA = null;
let nodeMap = {};   // id -> node object
let paperMap = {};  // title -> paper object
let simulation = null;
let svg, gMain, gLinks, gNodes, zoom;
let expandedOrg = null;
let selectedPerson = null;
let activeVenues = new Set();
let searchQuery = "";
let orgThreshold = 10;
let currentRankList = null; // "orgs" | "persons" | null
// area grouping for venue chips: SE / Security / Systems (incl. Crypto)
const AREAS = [
  { name: "SE", venues: ["ICSE","FSE","ASE","ISSTA"] },
  { name: "Security", venues: ["CCS","S&P","USENIX Security","NDSS","CRYPTO","EUROCRYPT","ASIACRYPT"] },
  { name: "Systems", venues: ["OSDI","SOSP","ASPLOS","EuroSys","HPDC"] },
];
let expandedAreas = new Set(); // which areas show all venues (vs collapsed top-3)
let panelHistory = []; // stack of {type, data} for back navigation
let _skipAutoZoom = false; // flag to skip zoomToFitAll when caller handles zoom
let _focusPersonId = null;  // ensure this person is visible when expanding org
const COLORS = [
  "#4E79A7","#F28E2B","#E15759","#76B7B2","#59A14F",
  "#EDC948","#B07AA1","#FF9DA7","#9C755F","#BAB0AC",
  "#D37295","#1B9E77","#D95F02","#7570B3","#E7298A",
  "#66A61E","#E6AB02","#A6761D","#8DD3C7","#FB8072",
  "#80B1D3","#B3DE69","#FCCDE5","#386CB0","#BF5B17",
];

// === Helpers ===
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;"); }
function jsEsc(s) { return String(s).replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/"/g,'\\"'); }
function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }
function getRadius(d) {
  // Uses venue-filtered count for orgs so radius matches active venue selection.
  // org: min 14 → max ~98, person: min 5 → max ~38
  if (d.type === "org") {
    const n = venueFilteredCount(d);
    return Math.max(14, Math.sqrt(n) * 6.5);
  }
  return Math.max(5, Math.sqrt(d.metrics.paper_count) * 5.2);
}
function getPersonOrgs(personId) {
  // return orgs for a specific person node (by ID, not name — avoids homonym collision).
  // Using ID prevents "Yang Liu@NTU" from showing Xidian/ShanghaiTech orgs.
  const pNode = nodeMap[personId];
  if (!pNode) return [];
  if (pNode.org && pNode.org !== "Unknown") return [pNode.org];
  return [];
}
function getOrgMemberIds(orgName) {
  // Return set of person node IDs (not names) belonging to this org.
  // Uses node.org field for precise matching — avoids homonym collisions
  // (e.g. "Zhenyu Chen@NTU" won't appear when expanding SJTU).
  const ids = new Set();
  DATA.nodes.forEach(n => { if (n.type === "person" && n.org === orgName) ids.add(n.id); });
  return ids;
}

// === Load data ===
fetch("graph_data.json?t=" + Date.now())
  .then(r => { if (!r.ok) throw new Error("Failed to load data"); return r.json(); })
  .then(data => {
    DATA = data;
    DATA.nodes.forEach(n => { nodeMap[n.id] = n; n._ox = null; n._oy = null; });
    // build name→person node lookup (for paper author clicks)
    DATA.nodes.filter(n => n.type === "person").forEach(n => { nodeMap["person:" + n.name] = n; });
    DATA.papers.forEach(p => paperMap[p.title] = p);
    // Default: all venues active
    DATA.meta.venues_covered.forEach(v => activeVenues.add(v));
    // pre-compute org positions on a wide ring
    const container = document.getElementById("graph-container");
    const W = container.clientWidth, H = container.clientHeight;
    const orgNodes = DATA.nodes.filter(n => n.type === "org");
    orgNodes.forEach((n, i) => {
      const angle = (2 * Math.PI * i) / orgNodes.length;
      const r = Math.min(W, H) * 0.32 + Math.random() * 40;
      n._ox = W/2 + Math.cos(angle) * r;
      n._oy = H/2 + Math.sin(angle) * r;
    });
    initVenueDropdown();
    renderVenueChips();
    initSVG();
    renderGraph();  // only renders visible nodes!
    renderPanel("global");
    updateFooter();
    setTimeout(() => document.getElementById("graph-hint")?.classList.add("hidden"), 5000);
  })
  .catch(err => {
    document.getElementById("panel").innerHTML = `<div class="empty-state">Failed to load graph_data.json<br><small>${esc(err.message)}</small></div>`;
  });

// === Stats ===
function computeFilteredStats() {
  const papers = DATA.papers.filter(p => activeVenues.has(p.venue));
  const personSet = new Set();
  papers.forEach(p => p.authors.forEach(a => personSet.add(a.name)));
  const orgCount = {};
  DATA.nodes.filter(n => n.type === "org" && n.name !== "Unknown" && n.venues.some(v => activeVenues.has(v)))
    .forEach(n => { const c = n.papers.filter(t => paperMap[t] && activeVenues.has(paperMap[t].venue)).length; if (c > 0) orgCount[n.name] = c; });
  const allOrgs = Object.entries(orgCount).sort((a,b) => b[1]-a[1]);
  // persons: return [id, name, count] so callers can use node ID for navigation
  const persArr = [];
  DATA.nodes.filter(n => n.type === "person" && n.venues.some(v => activeVenues.has(v)))
    .forEach(n => { const c = n.papers.filter(t => paperMap[t] && activeVenues.has(paperMap[t].venue)).length; if (c > 0) persArr.push([n.id, n.name, c]); });
  persArr.sort((a,b) => b[2]-a[2]);
  return { paper_count: papers.length, person_count: personSet.size, org_count: allOrgs.length, top_orgs: allOrgs, top_persons: persArr };
}

// === Venue dropdown ===
function venueLabel(v) { return v.replace(/\s*\d{2}(\d{2})$/, "'$1"); }

// toggle dropdown open/close
function initVenueDropdown() {
  const trigger = document.getElementById("venue-trigger");
  const dropdown = document.getElementById("venue-dropdown");
  // click trigger to toggle
  trigger.onclick = (e) => {
    e.stopPropagation();
    dropdown.classList.toggle("hidden");
  };
  // click outside to close
  document.addEventListener("click", (e) => {
    if (!dropdown.contains(e.target) && e.target !== trigger) {
      dropdown.classList.add("hidden");
    }
  });
  // prevent dropdown clicks from closing
  dropdown.onclick = (e) => e.stopPropagation();
}

function renderVenueChips() {
  // count papers per venue
  const venueCounts = {};
  DATA.papers.forEach(p => { venueCounts[p.venue] = (venueCounts[p.venue] || 0) + 1; });
  const allVenues = [...DATA.meta.venues_covered];

  // sort: year desc first, then conference name asc within same year
  function sortVenues(list) {
    return [...list].sort((a, b) => {
      const ya = parseInt(a.match(/\d{4}/)?.[0]) || 0, yb = parseInt(b.match(/\d{4}/)?.[0]) || 0;
      if (ya !== yb) return yb - ya;
      return a.replace(/\s*\d{4}$/, "").localeCompare(b.replace(/\s*\d{4}$/, ""));
    });
  }

  const allActive = allVenues.length > 0 && allVenues.every(v => activeVenues.has(v));

  // update trigger button text: "Venues 21/21 ▾" or "Venues 5/21 ▾"
  const countEl = document.getElementById("venue-count");
  countEl.textContent = `${activeVenues.size}/${allVenues.length}`;

  // build dropdown content
  const dropdown = document.getElementById("venue-dropdown");
  let html = `<div class="dropdown-top">`;
  html += `<button class="btn${allActive ? ' active' : ''}" data-action="all">All</button>`;
  // per-area quick select buttons
  AREAS.forEach(area => {
    const areaVenues = allVenues.filter(v => area.venues.some(av => v.replace(/\s*\d{4}$/, "") === av));
    const areaActive = areaVenues.length > 0 && areaVenues.every(v => activeVenues.has(v));
    html += `<button class="btn${areaActive ? ' active' : ''}" data-action="area" data-area-name="${area.name}">Only ${area.name}</button>`;
  });
  html += `</div>`;

  // each area group with chips
  AREAS.forEach(area => {
    const areaVenues = sortVenues(allVenues.filter(v => {
      const name = v.replace(/\s*\d{4}$/, "");
      return area.venues.some(av => name === av);
    }));
    if (!areaVenues.length) return;

    html += `<div class="area-group">`;
    html += `<div class="area-header"><span class="area-label">${area.name}</span></div>`;
    html += `<div class="area-chips">`;
    areaVenues.forEach(v => {
      html += `<button class="chip${activeVenues.has(v) ? ' active' : ''}" data-venue="${v}">${venueLabel(v)}<span class="cnt">${venueCounts[v] || 0}</span></button>`;
    });
    html += `</div></div>`;
  });
  dropdown.innerHTML = html;

  // bind top action buttons (All / Only SE / Only Security / Only Systems)
  dropdown.querySelectorAll(".dropdown-top .btn").forEach(btn => {
    btn.onclick = () => {
      const action = btn.dataset.action;
      if (action === "all") {
        if (allActive) {
          allVenues.forEach(v => activeVenues.delete(v));
          activeVenues.add(allVenues[0]);
        } else {
          allVenues.forEach(v => activeVenues.add(v));
        }
      } else if (action === "area") {
        // select only this area's venues
        const areaName = btn.dataset.areaName;
        const area = AREAS.find(a => a.name === areaName);
        const areaVenues = allVenues.filter(v => area.venues.some(av => v.replace(/\s*\d{4}$/, "") === av));
        allVenues.forEach(v => activeVenues.delete(v));
        areaVenues.forEach(v => activeVenues.add(v));
      }
      onVenueChange();
    };
  });

  // bind venue chip clicks
  dropdown.querySelectorAll(".chip").forEach(btn => {
    btn.onclick = () => {
      const v = btn.dataset.venue;
      if (activeVenues.has(v)) {
        if (activeVenues.size <= 1) return;
        activeVenues.delete(v);
      } else {
        activeVenues.add(v);
      }
      onVenueChange();
    };
  });
}

// called after any venue selection change — update everything
function onVenueChange() {
  renderVenueChips();
  if (expandedOrg) {
    const orgNode = nodeMap["org:" + expandedOrg];
    if (!orgNode || !orgNode.venues.some(v => activeVenues.has(v))) { expandedOrg = null; selectedPerson = null; }
  }
  renderGraph();
  if (searchQuery) { applySearch(); }
  else if (expandedOrg) renderPanel("org", nodeMap["org:" + expandedOrg]);
  else if (selectedPerson) renderPanel("person", selectedPerson);
  else if (currentRankList) showRankList(currentRankList, true);
  else renderPanel("global");
}

// === SVG setup (once) ===
function initSVG() {
  const container = document.getElementById("graph-container");
  const W = container.clientWidth, H = container.clientHeight;
  svg = d3.select(container).append("svg").attr("viewBox", [0, 0, W, H]);
  zoom = d3.zoom().scaleExtent([0.2, 5]).on("zoom", e => gMain.attr("transform", e.transform));
  svg.call(zoom);
  svg.append("rect").attr("width", W*3).attr("height", H*3)
    .attr("x", -W).attr("y", -H).attr("fill", "transparent")
    .on("click", () => goBack());
  gMain = svg.append("g");
  gLinks = gMain.append("g");
  gNodes = gMain.append("g");
  window.addEventListener("resize", () => {
    const nW = container.clientWidth, nH = container.clientHeight;
    svg.attr("viewBox", [0, 0, nW, nH]);
  });
}

// === CORE: renderGraph — only creates DOM for visible nodes/edges ===
function renderGraph() {
  if (!svg) return;
  const container = document.getElementById("graph-container");
  const W = container.clientWidth, H = container.clientHeight;
  const venueOk = n => n.venues.some(v => activeVenues.has(v));
  // stop previous simulation
  if (simulation) simulation.stop();

  // determine visible nodes and edges
  let visNodes, visEdges;
  if (expandedOrg === null) {
    // org-level view: use venue-filtered paper count for threshold
    visNodes = DATA.nodes.filter(n => {
      if (n.type !== "org" || n.name === "Unknown" || !venueOk(n)) return false;
      return venueFilteredCount(n) >= orgThreshold;
    });
    const visIds = new Set(visNodes.map(n => n.id));
    visEdges = DATA.edges.filter(e => e.type === "org_collab" && visIds.has(e.source) && visIds.has(e.target));
    // restore saved positions or use pre-computed ring positions
    visNodes.forEach(n => {
      if (n._ox != null) { n.x = n._ox; n.y = n._oy; }
    });
  } else {
    // expanded: show members of the expanded org + external coauthors
    const memberIds = getOrgMemberIds(expandedOrg);
    let coreNodes = DATA.nodes.filter(n => n.type === "person" && memberIds.has(n.id) && venueOk(n));
    // limit to top 50 members by paper count to keep graph readable
    if (coreNodes.length > 50) {
      coreNodes.sort((a, b) => venueFilteredCount(b) - venueFilteredCount(a));
      coreNodes = coreNodes.slice(0, 50);
    }
    // Ensure focused person is always included (even if not in top 50)
    if (_focusPersonId && memberIds.has(_focusPersonId) && !coreNodes.some(n => n.id === _focusPersonId)) {
      const fn = nodeMap[_focusPersonId];
      if (fn) coreNodes.push(fn);
    }
    const coreIds = new Set(coreNodes.map(n => n.id));
    // find external nodes with strong collaboration (≥2 joint papers)
    const extIds = new Set();
    DATA.edges.forEach(e => {
      if (e.type !== "coauthor" || e.weight < 2) return;
      if (coreIds.has(e.source) && !coreIds.has(e.target)) extIds.add(e.target);
      if (coreIds.has(e.target) && !coreIds.has(e.source)) extIds.add(e.source);
    });
    const extNodes = DATA.nodes.filter(n => extIds.has(n.id) && venueOk(n));
    // mark nodes
    coreNodes.forEach(n => n._external = false);
    extNodes.forEach(n => n._external = true);
    visNodes = [...coreNodes, ...extNodes];
    const visIds = new Set(visNodes.map(n => n.id));
    visEdges = DATA.edges.filter(e => e.type === "coauthor" && visIds.has(e.source) && visIds.has(e.target));
  }

  // make shallow copies for d3 force (so it doesn't mutate source/target to objects on DATA.edges)
  const edgeCopies = visEdges.map(e => ({...e}));

  // clear old DOM
  gLinks.selectAll("*").remove();
  gNodes.selectAll("*").remove();

  // draw edges — cross-org edges are dashed when in expanded view
  const coreIdSet = expandedOrg ? new Set(visNodes.filter(n => !n._external).map(n => n.id)) : null;
  const linkSel = gLinks.selectAll("line").data(edgeCopies).enter().append("line")
    .attr("class", "edge-line")
    .attr("stroke-width", d => Math.max(0.5, d.weight * 1.5))
    .attr("stroke-opacity", d => d.weight >= 3 ? 0.5 : d.weight >= 2 ? 0.35 : 0.2)
    .attr("stroke-dasharray", d => {
      if (!coreIdSet) return null;
      const sid = typeof d.source === "object" ? d.source.id : d.source;
      const tid = typeof d.target === "object" ? d.target.id : d.target;
      return (coreIdSet.has(sid) && coreIdSet.has(tid)) ? null : "4,3";
    });

  // draw nodes
  const nodeSel = gNodes.selectAll("g").data(visNodes).enter().append("g")
    .attr("class", "node-group")
    .call(d3.drag().on("start", dragStart).on("drag", dragging).on("end", dragEnd));

  nodeSel.append("circle")
    .attr("class", "node-circle")
    .attr("r", d => {
      const r = getRadius(d);
      return d._external ? Math.max(4, r * 0.6) : r;
    })
    .attr("fill", d => d._external ? "#9A998E" : COLORS[d.metrics.community_id % COLORS.length])
    .attr("stroke", d => d._external ? "rgba(255,255,255,0.6)" : "#fff")
    .attr("stroke-width", d => d.type === "org" ? 2 : d._external ? 1 : 1.5)
    .attr("opacity", d => d._external ? 0.7 : 1)
    .on("click", (e, d) => { e.stopPropagation(); onNodeClick(d); })
    .on("mouseenter", (e, d) => showTooltip(e, d))
    .on("mouseleave", hideTooltip);

  nodeSel.append("text")
    .attr("class", "node-label")
    .attr("dy", d => {
      const r = getRadius(d);
      return (d._external ? Math.max(4, r * 0.6) : r) + 14;
    })
    .attr("font-size", d => d.type === "org" ? "12px" : d._external ? "7px" : "9px")
    .attr("font-weight", d => d.type === "org" ? "600" : "400")
    .attr("opacity", d => d._external ? 0.5 : 1)
    .text(d => d.name);

  // create simulation with ONLY visible nodes
  const isOrgLevel = expandedOrg === null;
  // Scale forces by node count: more nodes → weaker charge but stronger collide
  const N = visNodes.length;
  const orgCharge = N > 300 ? -100 : N > 150 ? -200 : N > 80 ? -400 : -800;
  const orgDist = N > 300 ? 30 : N > 150 ? 60 : N > 80 ? 100 : 150;
  const centerStr = N > 300 ? 0.1 : N > 150 ? 0.06 : 0.04;
  simulation = d3.forceSimulation(visNodes)
    .force("link", d3.forceLink(edgeCopies).id(d => d.id).distance(isOrgLevel ? orgDist : 50).strength(isOrgLevel ? 0.15 : 0.3))
    .force("charge", d3.forceManyBody().strength(isOrgLevel ? orgCharge : -200))
    .force("center", d3.forceCenter(W/2, H/2).strength(centerStr))
    .force("collide", d3.forceCollide().radius(d => getRadius(d) + (isOrgLevel ? 8 : 4)).strength(1).iterations(isOrgLevel ? 5 : 3))
    .on("tick", () => {
      linkSel.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
             .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
      nodeSel.attr("transform", d => `translate(${d.x},${d.y})`);
    })
    .alpha(1).velocityDecay(0.3);

  // Pre-zoom for large graphs so zoomToFitAll doesn't cause a dramatic shrink.
  // For N>100 org nodes, the final scale is roughly 0.85 * W / (spread).
  // Spread grows ~sqrt(N) * avgRadius, so estimate scale ≈ k / sqrt(N).
  if (!_skipAutoZoom && isOrgLevel && N > 50) {
    const estScale = Math.max(0.3, Math.min(0.9, 6.0 / Math.sqrt(N)));
    svg.call(zoom.transform, d3.zoomIdentity.translate(W/2, H/2).scale(estScale).translate(-W/2, -H/2));
  }

  // apply search highlight if active
  if (searchQuery) applySearch();

  // auto-fit after settling (skip when caller will handle zoom)
  if (!_skipAutoZoom) setTimeout(() => zoomToFitAll(), 600);
  _skipAutoZoom = false;
}

// === Node click ===
function onNodeClick(d) {
  if (d.type === "org") {
    expandOrg(d.name);
  } else if (d.type === "person") {
    selectedPerson = d;
    highlightPerson(d);
    renderPanel("person", d);
  }
}

function expandOrg(orgName, skipPanel, focusPersonId) {
  // save current org positions before switching
  if (expandedOrg === null) {
    DATA.nodes.filter(n => n.type === "org").forEach(n => { if (n.x != null) { n._ox = n.x; n._oy = n.y; } });
  }
  const orgNode = nodeMap["org:" + orgName];
  expandedOrg = orgName;
  selectedPerson = null;
  // position core members on inner ring, external on outer ring
  const memberIds = getOrgMemberIds(orgName);
  const cx = orgNode?.x ?? orgNode?._ox ?? 400, cy = orgNode?.y ?? orgNode?._oy ?? 300;
  // sort members by paper count, limit to top 50 for layout
  const venueOk2 = n => n.venues.some(v => activeVenues.has(v));
  let coreMembers = DATA.nodes.filter(n => n.type === "person" && memberIds.has(n.id) && venueOk2(n));
  coreMembers.sort((a, b) => venueFilteredCount(b) - venueFilteredCount(a));
  if (coreMembers.length > 50) coreMembers = coreMembers.slice(0, 50);
  // Ensure focused person (from search click) is always included
  if (focusPersonId && !coreMembers.some(n => n.id === focusPersonId)) {
    const focusNode = nodeMap[focusPersonId];
    if (focusNode) coreMembers.push(focusNode);
  }
  const coreMemberIds = new Set(coreMembers.map(n => n.id));
  const coreCount = coreMembers.length;
  const innerR = 50 + Math.sqrt(coreCount) * 20;
  let i = 0;
  coreMembers.forEach(n => {
    const angle = (2 * Math.PI * i) / Math.max(coreCount, 1);
    n.x = cx + Math.cos(angle) * innerR;
    n.y = cy + Math.sin(angle) * innerR;
    n.vx = 0; n.vy = 0;
    n._external = false;
    i++;
  });
  // position external collaborators on outer ring
  const outerR = innerR + 80;
  let j = 0;
  const extCandidates = [];
  DATA.edges.forEach(e => {
    if (e.type !== "coauthor" || e.weight < 2) return;
    if (coreMemberIds.has(e.source) && !coreMemberIds.has(e.target)) extCandidates.push(e.target);
    if (coreMemberIds.has(e.target) && !coreMemberIds.has(e.source)) extCandidates.push(e.source);
  });
  const extIdSet = new Set(extCandidates);
  const extCount = extIdSet.size || 1;
  DATA.nodes.forEach(n => {
    if (n.type === "person" && !coreMemberIds.has(n.id)) {
      n._external = true;
      if (extIdSet.has(n.id)) {
        const angle = (2 * Math.PI * j) / extCount;
        n.x = cx + Math.cos(angle) * outerR;
        n.y = cy + Math.sin(angle) * outerR;
        n.vx = 0; n.vy = 0;
        j++;
      }
    }
  });
  renderGraph();
  if (!skipPanel) renderPanel("org", orgNode);
}

function collapseToOrg() {
  if (expandedOrg === null && selectedPerson === null && !searchQuery && !currentRankList) return;
  expandedOrg = null;
  selectedPerson = null;
  searchQuery = "";
  currentRankList = null;
  panelHistory = [];
  document.getElementById("search").value = "";
  renderGraph();
  renderPanel("global");
}

// Progressive back: blank-click goes up ONE level instead of nuking everything
function goBack() {
  // Level 3: person selected inside org → go back to org view
  if (selectedPerson && expandedOrg) {
    selectedPerson = null;
    clearHighlights();
    renderPanel("org", nodeMap["org:" + expandedOrg]);
    return;
  }
  // Level 2: person selected (no org expanded) → go back to overview
  if (selectedPerson && !expandedOrg) {
    selectedPerson = null;
    clearHighlights();
    renderGraph();
    renderPanel("global");
    return;
  }
  // Level 2: org expanded → collapse to org-level overview
  if (expandedOrg) {
    expandedOrg = null;
    selectedPerson = null;
    clearHighlights();
    renderGraph();
    renderPanel("global");
    return;
  }
  // Level 1: rank list open → go back to overview
  if (currentRankList) {
    currentRankList = null;
    panelHistory = [];
    renderPanel("global");
    return;
  }
  // Level 0: search active → clear search
  if (searchQuery) {
    searchQuery = "";
    document.getElementById("search").value = "";
    clearHighlights();
    renderPanel("global");
    return;
  }
  updateBreadcrumb();
}


// === Breadcrumb ===
function updateBreadcrumb() {
  const el = document.getElementById("breadcrumb");
  if (!el) return;
  const parts = [];
  // Root: clickable home
  parts.push(`<span onclick="collapseToOrg()">Overview</span>`);
  if (expandedOrg) {
    parts.push(`<span class="sep">›</span>`);
    if (selectedPerson) {
      parts.push(`<span onclick="goBack()">${esc(expandedOrg)}</span>`);
      parts.push(`<span class="sep">›</span>`);
      parts.push(`<span class="current">${esc(selectedPerson.name)}</span>`);
    } else {
      parts.push(`<span class="current">${esc(expandedOrg)}</span>`);
    }
  } else if (selectedPerson) {
    parts.push(`<span class="sep">›</span>`);
    parts.push(`<span class="current">${esc(selectedPerson.name.replace(/\s*\[(SE|Security|Systems)\]$/, ""))}</span>`);
  }
  el.innerHTML = parts.join("");
}

// === Zoom helpers ===
function zoomToFitAll() {
  if (!simulation) return;
  const visNodes = simulation.nodes();
  if (visNodes.length === 0) return;
  setTimeout(() => {
    const xs = visNodes.map(n => n.x).filter(v => v != null && !isNaN(v));
    const ys = visNodes.map(n => n.y).filter(v => v != null && !isNaN(v));
    if (xs.length === 0) return;
    const container = document.getElementById("graph-container");
    const W = container.clientWidth, H = container.clientHeight;
    const cx = (d3.min(xs) + d3.max(xs)) / 2;
    const cy = (d3.min(ys) + d3.max(ys)) / 2;
    const dx = d3.max(xs) - d3.min(xs) + 150;
    const dy = d3.max(ys) - d3.min(ys) + 150;
    const scale = Math.max(0.2, Math.min(2, 0.85 / Math.max(dx / W, dy / H)));
    svg.transition().duration(800).call(
      zoom.transform, d3.zoomIdentity.translate(W/2, H/2).scale(scale).translate(-cx, -cy)
    );
  }, 100);
}

function zoomToNode(d) {
  if (!d || d.x == null || d.y == null) return;
  const container = document.getElementById("graph-container");
  const W = container.clientWidth, H = container.clientHeight;
  svg.transition().duration(500).call(
    zoom.transform, d3.zoomIdentity.translate(W/2, H/2).scale(1.5).translate(-d.x, -d.y)
  );
}

// === Highlight ===
function clearHighlights() {
  if (!gNodes) return;
  gNodes.selectAll(".node-circle").classed("dimmed", false).classed("glowing", false);
  gLinks.selectAll(".edge-line").classed("dimmed", false).classed("highlighted", false);
}

function highlightPerson(d) {
  if (!gNodes || !gLinks) return;
  const pid = d.id;
  gNodes.selectAll(".node-circle").classed("dimmed", true).classed("glowing", false);
  gLinks.selectAll(".edge-line").classed("dimmed", true).classed("highlighted", false);
  // glow the selected node
  gNodes.selectAll(".node-group").filter(n => n.id === pid)
    .select(".node-circle").classed("dimmed", false).classed("glowing", true);
  // highlight connected edges and un-dim connected nodes
  const connectedIds = new Set();
  gLinks.selectAll(".edge-line").each(function(e) {
    // d3 force mutates source/target from string → object; handle both
    const sid = (e.source && e.source.id) || e.source;
    const tid = (e.target && e.target.id) || e.target;
    if (sid === pid || tid === pid) {
      d3.select(this).classed("dimmed", false).classed("highlighted", true);
      connectedIds.add(sid === pid ? tid : sid);
    }
  });
  // un-dim connected neighbor nodes
  if (connectedIds.size > 0) {
    gNodes.selectAll(".node-group").filter(n => connectedIds.has(n.id))
      .select(".node-circle").classed("dimmed", false);
  }
}

// === Search ===
document.getElementById("search").addEventListener("input", debounce(e => {
  searchQuery = e.target.value.trim().toLowerCase();
  resetSearchExpand(); // reset "show all" when query changes
  if (!DATA || !svg) return;
  if (!searchQuery) {
    clearHighlights();
    if (expandedOrg) renderPanel("org", nodeMap["org:" + expandedOrg]);
    else renderPanel("global");
    return;
  }
  applySearch();
}, 300));

function applySearch() {
  if (!gNodes || !searchQuery) return;
  const q = searchQuery;

  // Only search within active venues (scoped to current area)
  const venueOk = n => n.venues.some(v => activeVenues.has(v));
  const matchedPersons = [];
  const matchedOrgs = new Set();
  const matchedPapers = [];

  DATA.nodes.forEach(d => {
    if (!venueOk(d)) return;  // skip nodes outside current area
    const nameMatch = d.name.toLowerCase().includes(q);
    // only check papers within active venues
    const activePapers = d.papers.filter(t => { const p = paperMap[t]; return p && activeVenues.has(p.venue); });
    const paperMatch = activePapers.some(t => t.toLowerCase().includes(q));
    const absMatch = activePapers.some(t => (paperMap[t]?.abstract || "").toLowerCase().includes(q));
    if (nameMatch || paperMatch || absMatch) {
      if (d.type === "person") {
        matchedPersons.push(d);
        matchedOrgs.add(d.org);
      } else if (d.type === "org") {
        matchedOrgs.add(d.name);
      }
    }
  });
  // Merge same-name person nodes that represent the same real person.
  // Two nodes merge when: (a) exact same org, OR (b) one org is a prefix/subset of the other
  // (e.g. "Tsinghua University" vs "Tsinghua University; Zhongguancun Laboratory").
  // Different real orgs stay separate (e.g. Yang Liu@NTU vs Yang Liu@Xidian).
  // Org alias map: abbreviation → canonical full name (lowercase)
  const ORG_ALIASES = [
    [/\b(hkust|hong kong university of science and technology)\b/i, "hkust"],
    [/\b(ntu|nanyang technological university)\b/i, "ntu"],
    [/\b(nus|national university of singapore)\b/i, "nus"],
    [/\b(penn state|pennsylvania state)\b/i, "penn state"],
    [/\b(cmu|carnegie mellon)\b/i, "cmu"],
    [/\b(mit|massachusetts institute of technology)\b/i, "mit"],
    [/\b(eth zurich|eth zürich|eth z)/i, "eth zurich"],
    [/\b(sustech|southern university of science and technology)\b/i, "sustech"],
    [/\b(mpi-sp|max planck institute for security)\b/i, "mpi-sp"],
    [/\b(cispa|helmholtz center for information security)\b/i, "cispa"],
    [/\binstitute of information engineering\b/i, "iie-cas"],
    [/\binstitute of computing technology\b/i, "ict-cas"],
    [/\binstitute of software.{0,30}chinese academy/i, "iscas"],
  ];
  function orgCanon(o) {
    if (!o) return "";
    // strip trailing lab/dept qualifiers, take first segment
    const s = o.replace(/[,;]\s*/g, "\0").split("\0")[0].trim().toLowerCase();
    for (const [re, canon] of ORG_ALIASES) { if (re.test(o)) return canon; }
    return s;
  }
  function orgSame(a, b) {
    if (!a || !b) return a === b;
    const ca = orgCanon(a), cb = orgCanon(b);
    return ca === cb || ca.startsWith(cb) || cb.startsWith(ca);
  }
  const personGroups = []; // [{id, name, org, totalPapers, bestPapers, nodes[], exactMatch}]
  matchedPersons.forEach(p => {
    const pc = p.papers.filter(t => { const pp = paperMap[t]; return pp && activeVenues.has(pp.venue); }).length;
    const exact = p.name.toLowerCase() === q;
    // try to find existing group with same name + compatible org
    let found = null;
    for (const g of personGroups) {
      if (g.name === p.name && orgSame(g.org, p.org || "")) { found = g; break; }
    }
    if (!found) {
      personGroups.push({ id: p.id, name: p.name, org: p.org || "", totalPapers: pc, bestPapers: pc, nodes: [p], exactMatch: exact });
    } else {
      found.totalPapers += pc;
      found.nodes.push(p);
      if (exact) found.exactMatch = true;
      if (pc > found.bestPapers) { found.bestPapers = pc; found.id = p.id; }
      // keep the shorter (cleaner) org name
      if (p.org && found.org && p.org.length < found.org.length) found.org = p.org;
    }
  });
  // Sort: exact name match first, then by paper count
  const mergedPersons = personGroups.sort((a, b) => {
    if (a.exactMatch !== b.exactMatch) return a.exactMatch ? -1 : 1;
    return b.totalPapers - a.totalPapers;
  });

  DATA.papers.forEach(p => {
    if (!activeVenues.has(p.venue)) return;  // skip papers outside current area
    if (p.title.toLowerCase().includes(q) || (p.abstract || "").toLowerCase().includes(q)) {
      matchedPapers.push(p);
    }
  });

  // highlight visible nodes: glow matched, dim unmatched
  gNodes.selectAll(".node-group").each(function(d) {
    let match = false;
    if (d.type === "org") {
      match = matchedOrgs.has(d.name);
    } else {
      match = matchedPersons.some(m => m.id === d.id);
    }
    d3.select(this).select(".node-circle").classed("dimmed", !match).classed("glowing", match);
  });
  gLinks.selectAll(".edge-line").classed("dimmed", true);

  // render search results in panel
  const el = document.getElementById("panel");
  el.scrollTop = 0;
  const defaultShow = 20;
  // track how many to show (expandable)
  if (!applySearch._showAllAuthors) applySearch._showAllAuthors = false;
  if (!applySearch._showAllPapers) applySearch._showAllPapers = false;
  const authLimit = applySearch._showAllAuthors ? mergedPersons.length : defaultShow;
  const paperLimit = applySearch._showAllPapers ? matchedPapers.length : defaultShow;

  let html = `<h2>Search: "${esc(searchQuery)}"</h2>`;

  // authors section (merged same-name+same-org nodes)
  if (mergedPersons.length) {
    html += `<div class="section-label">Authors (${mergedPersons.length})</div>`;
    html += mergedPersons.slice(0, authLimit).map(g => {
      return `<div class="list-item" onclick="onPersonClick('${jsEsc(g.id)}')">${esc(g.name)} <span class="count">${g.totalPapers}p · ${esc(g.org)}</span></div>`;
    }).join("");
    if (mergedPersons.length > defaultShow && !applySearch._showAllAuthors) {
      html += `<div class="list-item" style="color:var(--accent);font-size:0.8rem;justify-content:center" id="show-all-authors">Show all ${mergedPersons.length} authors ▾</div>`;
    }
  }

  // papers section — use renderPaperItem for expandable abstracts
  if (matchedPapers.length) {
    html += `<div class="section-label">Papers (${matchedPapers.length})</div>`;
    html += matchedPapers.slice(0, paperLimit).map(p => renderPaperItem(p, "")).join("");
    if (matchedPapers.length > defaultShow && !applySearch._showAllPapers) {
      html += `<div class="list-item" style="color:var(--accent);font-size:0.8rem;justify-content:center" id="show-all-papers">Show all ${matchedPapers.length} papers ▾</div>`;
    }
  }

  if (!matchedPersons.length && !matchedPapers.length) {
    html += '<div class="empty-state">No results found</div>';
  }

  el.innerHTML = html;
  bindPaperToggles(); // enable paper abstract expand/collapse

  // bind "show all" buttons
  document.getElementById("show-all-authors")?.addEventListener("click", () => {
    applySearch._showAllAuthors = true;
    applySearch();
  });
  document.getElementById("show-all-papers")?.addEventListener("click", () => {
    applySearch._showAllPapers = true;
    applySearch();
  });
}
// reset expand state when search query changes
function resetSearchExpand() {
  applySearch._showAllAuthors = false;
  applySearch._showAllPapers = false;
}

// === Navigation from panel ===
function panelNav() {
  // Always show Back (progressive) + Overview (jump to root) when not at root
  const showHome = expandedOrg || selectedPerson || currentRankList;
  return `<div class="panel-nav"><span class="back-btn" onclick="panelBack()">← Back</span>${showHome ? '<span class="home-btn" onclick="collapseToOrg()">Overview</span>' : ''}</div>`;
}
function pushPanel() {
  panelHistory.push({ expandedOrg, selectedPerson, currentRankList });
}
function panelBack() {
  // Try history stack first for complex navigation chains (search → person → coauthor)
  if (panelHistory.length) {
    const prev = panelHistory.pop();
    expandedOrg = prev.expandedOrg;
    selectedPerson = prev.selectedPerson;
    currentRankList = prev.currentRankList;
    clearHighlights();
    if (currentRankList) { renderGraph(); showRankList(currentRankList, true); }
    else if (selectedPerson) { highlightPerson(selectedPerson); renderGraph(); renderPanel("person", selectedPerson); }
    else if (expandedOrg) { renderGraph(); renderPanel("org", nodeMap["org:" + expandedOrg]); }
    else { renderGraph(); renderPanel("global"); }
    return;
  }
  // No history — use progressive back (same as blank click)
  goBack();
}

function onPersonClick(id) {
  const d = nodeMap[id];
  if (!d) return;
  pushPanel();
  // check if person is already visible in the current expanded org
  let alreadyVisible = false;
  if (expandedOrg !== null) {
    const members = getOrgMemberIds(expandedOrg);
    alreadyVisible = members.has(d.id);
  }
  if (!alreadyVisible) {
    // expand this person's org first, then locate after simulation settles
    const targetOrg = d.org || "";
    _skipAutoZoom = true;
    _focusPersonId = d.id;
    if (targetOrg) expandOrg(targetOrg, true, d.id);
    _focusPersonId = null;
    selectedPerson = d;
    renderPanel("person", d);
    setTimeout(() => { highlightPerson(d); zoomToNode(d); }, 600);
  } else {
    selectedPerson = d;
    highlightPerson(d);
    renderPanel("person", d);
    zoomToNode(d);
  }
}

function showRankList(type, isBack) {
  if (!isBack) pushPanel();
  currentRankList = type;
  const m = computeFilteredStats();
  const el = document.getElementById("panel");
  const isOrgs = type === "orgs";
  const list = isOrgs ? m.top_orgs : m.top_persons;
  const title = isOrgs ? "All Organizations" : "All Researchers";
  el.innerHTML = `
    ${panelNav()}
    <h2>${title} <span class="count" style="font-size:0.85rem;font-weight:400">${list.length}</span></h2>
    <div class="rank-list">${isOrgs ? list.map(([name, c], i) =>
      `<div class="list-item" onclick="jumpToNode('org:${jsEsc(name)}')"><span class="rank-num">${i+1}.</span> ${esc(name)} <span class="count">${c}p</span></div>`
    ).join("") : list.map(([id, name, c], i) =>
      `<div class="list-item" onclick="jumpToNode('${jsEsc(id)}')"><span class="rank-num">${i+1}.</span> ${esc(name)} <span class="count">${c}p</span></div>`
    ).join("")}</div>
  `;
}
function jumpToNode(id) {
  const d = nodeMap[id];
  if (!d) return;
  if (d.type === "org") { pushPanel(); expandOrg(d.name); return; }
  if (d.type === "person") { onPersonClick(id); return; }
}

// === Threshold toggle ===
function setThreshold(val) {
  orgThreshold = Math.max(1, parseInt(val) || 1);
  if (expandedOrg) { expandedOrg = null; selectedPerson = null; }
  renderGraph();
  renderPanel("global");
}

// === Tooltip ===
const tooltipEl = document.getElementById("tooltip");
function venueFilteredCount(d) {
  return d.papers.filter(t => { const p = paperMap[t]; return p && activeVenues.has(p.venue); }).length;
}
function showTooltip(e, d) {
  const pc = venueFilteredCount(d);
  const cleanName = d.name.replace(/\s*\[(SE|Security|Systems)\]$/, "");
  const text = d.type === "org"
    ? `${cleanName} — ${pc} papers`
    : `${cleanName} — ${d.org} (${pc} papers)`;
  tooltipEl.textContent = text;
  tooltipEl.style.left = (e.clientX + 14) + "px";
  tooltipEl.style.top = (e.clientY - 12) + "px";
  tooltipEl.style.opacity = 1;
}
function hideTooltip() { tooltipEl.style.opacity = 0; }

// === Drag ===
function dragStart(e, d) { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
function dragging(e, d) { d.fx = e.x; d.fy = e.y; }
function dragEnd(e, d) { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }

// === Panel ===
function renderPanel(mode, data) {
  const el = document.getElementById("panel");
  el.scrollTop = 0;
  updateBreadcrumb();

  if (mode === "global") {
    const m = computeFilteredStats();
    const areaLabel = "Overview";
    const venueOk = n => n.venues.some(v => activeVenues.has(v));
    const visibleCount = DATA.nodes.filter(n => n.type === "org" && n.name !== "Unknown" && venueOk(n) && venueFilteredCount(n) >= orgThreshold).length;
    const totalOrgCount = m.org_count;
    el.innerHTML = `
      <h2>${esc(areaLabel)} Overview</h2>
      <div class="filter-scope">${[...activeVenues].map(v => venueLabel(v)).join(", ")} · ${visibleCount}/${totalOrgCount} orgs
        <span style="margin-left:0.4rem">≥ <input type="number" id="threshold-input" value="${orgThreshold}" min="1" max="50" style="width:3rem;padding:0.15rem 0.3rem;border:1px solid var(--border-strong);border-radius:var(--radius);font-family:var(--mono);font-size:0.75rem;text-align:center;background:var(--bg-card)"> papers</span>
      </div>
      <div class="stat-grid">
        <div class="stat"><div class="num">${m.paper_count}</div><div class="label">Papers</div></div>
        <div class="stat clickable-stat" onclick="showRankList('persons')"><div class="num">${m.person_count}</div><div class="label">Authors ›</div></div>
        <div class="stat clickable-stat" onclick="showRankList('orgs')"><div class="num">${m.org_count}</div><div class="label">Orgs ›</div></div>
      </div>
      <div class="section-label">Top Organizations</div>
      ${m.top_orgs.length ? m.top_orgs.slice(0,10).map(([o, c]) => `<div class="list-item" onclick="jumpToNode('org:${jsEsc(o)}')">${esc(o)} <span class="count">${c}p</span></div>`).join("") : '<div class="empty-state">No data</div>'}
      <div class="section-label">Top Researchers</div>
      ${m.top_persons.length ? m.top_persons.slice(0,10).map(([id, name, c]) => `<div class="list-item" onclick="jumpToNode('${jsEsc(id)}')">${esc(name)} <span class="count">${c}p</span></div>`).join("") : '<div class="empty-state">No data</div>'}
    `;
    const thInput = document.getElementById("threshold-input");
    if (thInput) thInput.onchange = () => setThreshold(thInput.value);
  } else if (mode === "org" && data) {
    const memberIdSet = getOrgMemberIds(data.name);
    // venue-aware: only count papers matching active venues
    const venueFilter = t => { const p = paperMap[t]; return p && activeVenues.has(p.venue); };
    const orgPapers = data.papers.filter(venueFilter);
    const orgPaperSet = new Set(orgPapers);
    const members = DATA.nodes.filter(n => n.type === "person" && memberIdSet.has(n.id))
      .map(m => ({ ...m, _orgCount: m.papers.filter(t => orgPaperSet.has(t)).length }))
      .filter(m => m._orgCount > 0)
      .sort((a, b) => b._orgCount - a._orgCount || b.metrics.paper_count - a.metrics.paper_count);
    const collabEdges = DATA.edges.filter(e => e.type === "org_collab" &&
      (e.source === data.id || e.target === data.id) &&
      e.venues.some(v => activeVenues.has(v)))
      .sort((a, b) => b.weight - a.weight).slice(0, 5);
    // sort papers: by venue, then title alphabetically
    const sortedPapers = sortPapers(orgPapers);
    el.innerHTML = `
      ${panelNav()}
      <h3>${esc(data.name)}</h3>
      <div style="margin:0.4rem 0">
        <span class="tag tag-accent">${orgPapers.length} papers</span>
        <span class="tag tag-blue">${members.length} authors</span>
      </div>
      <div class="section-label">Members</div>
      ${members.map(m => `<div class="list-item" onclick="onPersonClick('${jsEsc(m.id)}')">${esc(m.name)} <span class="count">${m._orgCount}p</span></div>`).join("")}
      <div class="section-label">Papers</div>
      ${sortedPapers.map(t => renderPaperItem(t, null)).join("")}
      ${collabEdges.length ? `<div class="section-label">Top Collaborating Orgs</div>` +
        collabEdges.map(e => {
          const oName = nodeMap[e.source === data.id ? e.target : e.source]?.name;
          return oName ? `<div class="list-item" onclick="jumpToNode('org:${jsEsc(oName)}')">${esc(oName)} <span class="count">${e.weight} joint</span></div>` : '';
        }).join("") : ""}
    `;
    bindPaperToggles();
  } else if (mode === "person" && data) {
    // venue-aware: filter papers and coauthor edges by active venues
    const venueFilter = t => { const p = paperMap[t]; return p && activeVenues.has(p.venue); };
    const visPapers = data.papers.filter(venueFilter);
    const coauthorEdges = DATA.edges.filter(e => e.type === "coauthor" &&
      (e.source === data.id || e.target === data.id) &&
      e.venues.some(v => activeVenues.has(v)))
      .sort((a, b) => b.weight - a.weight);
    const topCoauthors = coauthorEdges.slice(0, 5).map(e => ({
      node: nodeMap[e.source === data.id ? e.target : e.source],
      weight: e.weight
    })).filter(x => x.node);
    el.innerHTML = `
      ${panelNav()}
      <h3>${esc(data.name)}</h3>
      <div style="margin:0.4rem 0">${getPersonOrgs(data.id).map(o => '<span class="tag tag-accent' + (o === data.org ? '' : ' tag-secondary') + '" onclick="jumpToNode(\'org:' + jsEsc(o) + '\')" style="cursor:pointer">' + esc(o) + '</span>').join(" ")}</div>
      <p style="margin:0.5rem 0;font-size:0.82rem;color:var(--text-secondary);line-height:1.5">${esc(data.summary)}</p>
      <div class="section-label">Papers (${visPapers.length})</div>
      ${sortPapers(visPapers).map(t => renderPaperItem(t, data.name)).join("")}
      ${topCoauthors.length ? `<div class="section-label">Top Coauthors</div>` +
        topCoauthors.map(({node: c, weight: w}) => `<div class="list-item" onclick="onPersonClick('${jsEsc(c.id)}')" style="flex-wrap:wrap"><span>${esc(c.name)}</span> <span class="count">${w}p · ${esc(c.org)}</span></div>`).join("") : ""}
    `;
    bindPaperToggles();
  }
}

function sortPapers(papers) {
  // sort by year (descending), then conference name (alphabetical), then title (alphabetical)
  return [...papers].sort((a, b) => {
    const pa = paperMap[a], pb = paperMap[b];
    if (!pa || !pb) return 0;
    // year descending
    const ya = pa.year || 0, yb = pb.year || 0;
    if (ya !== yb) return yb - ya;
    // conference name (strip year): "ICSE 2025" → "ICSE"
    const ca = (pa.venue || "").replace(/\s*\d{4}$/, ""), cb = (pb.venue || "").replace(/\s*\d{4}$/, "");
    if (ca !== cb) return ca.localeCompare(cb);
    // title alphabetical
    return a.localeCompare(b);
  });
}
function renderPaperItem(title, personName) {
  const p = paperMap[title];
  if (!p) return `<div class="paper-item"><div class="paper-title"><span>${esc(title)}</span></div></div>`;
  const abs = p.abstract || "";
  let posTag = "";
  if (personName && p.authors.length > 0) {
    const idx = p.authors.findIndex(a => a.name === personName);
    if (idx === 0) posTag = '<span class="pos-tag">#1</span>';
    else if (idx === p.authors.length - 1) posTag = '<span class="pos-tag last">#' + p.authors.length + '</span>';
    else if (idx > 0) posTag = '<span class="pos-tag">#' + (idx+1) + '</span>';
  }
  // venue tag: "FSE 2026" → "FSE'26"
  const venueTag = p.venue ? `<span class="venue-tag">${esc(p.venue.replace(/\s*\d{2}(\d{2})$/, "'$1"))}</span>` : '';
  // clickable author list — use orcid/dblp_pid for precise node lookup, fallback name@aff
  const authorHtml = p.authors.map(a => {
    let node = null;
    if (a.orcid) node = nodeMap["person:orcid:" + a.orcid];
    if (!node && a.dblp_pid) node = nodeMap["person:dblp:" + a.dblp_pid];
    if (!node && a.affiliation) node = nodeMap["person:" + a.name + "@" + a.affiliation];
    if (!node) node = nodeMap["person:" + a.name];
    return node
      ? `<span class="paper-author" onclick="onPersonClick('${jsEsc(node.id)}')">${esc(a.name)}</span>`
      : `<span class="paper-author-plain">${esc(a.name)}</span>`;
  }).join(", ");
  return `<div class="paper-item">
    <div class="paper-title"${abs ? ' data-abs="1"' : ''}>${abs ? '<span class="arrow">\u25B8</span>' : ''}${posTag}${venueTag}<span style="flex:1">${esc(title)}</span></div>
    <div class="paper-authors">${authorHtml}</div>
    ${abs ? `<div class="paper-abstract">${esc(abs)}</div>` : ""}
  </div>`;
}


function bindPaperToggles() {
  document.querySelectorAll(".paper-title[data-abs='1']").forEach(el => {
    el.onclick = () => {
      // abstract is inside the same .paper-item parent, after .paper-authors
      const abs = el.closest(".paper-item")?.querySelector(".paper-abstract");
      const arrow = el.querySelector(".arrow");
      if (abs) abs.classList.toggle("open");
      if (arrow) arrow.classList.toggle("open");
    };
  });
}

// === Keyboard shortcuts ===
document.addEventListener("keydown", e => {
  if (e.key === "Escape") {
    // If search input is focused and has text, clear it first
    const searchEl = document.getElementById("search");
    if (document.activeElement === searchEl && searchEl.value) {
      searchEl.value = "";
      searchQuery = "";
      clearHighlights();
      if (expandedOrg) renderPanel("org", nodeMap["org:" + expandedOrg]);
      else renderPanel("global");
      searchEl.blur();
      return;
    }
    // Otherwise progressive back
    searchEl.blur();
    goBack();
  }
});

// === Footer ===
function updateFooter() {
  const s = DATA.meta.total_stats;
  document.getElementById("footer-info").textContent =
    `${DATA.meta.venues_covered.length} venues · ${s.paper_count} papers · ${s.person_count} authors · ${s.org_count} orgs · Updated ${DATA.meta.last_updated.split("T")[0]}`;
}

</script>
